<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Flipkart College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #DC2626;
            --bright-red: #FF3B3B;
            --dark-red: #B91C1C;
            --accent-black: #0F0F0F;
            --dark-grey: #1A1A1A;
            --light-grey: #2A2A2A;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--accent-black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 24px;
            padding: 50px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
        }

        .error-message {
            color: var(--bright-red);
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        .dashboard {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dashboard-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .dashboard-title span {
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: var(--white);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #EF4444;
            color: #EF4444;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--bright-red);
        }

        .emails-container {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .emails-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box input {
            padding: 10px 15px 10px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.9rem;
            width: 250px;
        }

        .emails-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .email-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-delete {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #EF4444;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-grey);
            border: 1px solid var(--primary-red);
            border-radius: 12px;
            padding: 16px 24px;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; text-align: center; }
            .email-item { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-logo">Flipkart College</div>
        <div class="login-subtitle">Admin Dashboard</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter password">
        </div>
        <button class="btn-login" onclick="checkPassword()">Login</button>
        <div class="error-message" id="errorMessage">Incorrect password</div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Notify Me <span>Subscribers</span></h1>
            <div class="dashboard-actions">
                <button class="btn btn-secondary" onclick="exportEmails()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Export CSV</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weekCount">0</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div class="emails-container">
            <div class="emails-header">
                <div>Total: <span id="listCount">0</span> emails</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search emails..." onkeyup="searchEmails()">
                </div>
            </div>
            <div class="emails-list" id="emailsList"></div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage">Action completed</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBTf0IwfY6iTRBSS5Ruw7TlJAtFT2j-rV0",
            authDomain: "flipkartcollege.firebaseapp.com",
            projectId: "flipkartcollege",
            storageBucket: "flipkartcollege.firebasestorage.app",
            messagingSenderId: "681806986839",
            appId: "1:681806986839:web:9d8ec56ac0b0a018a0ed12",
            measurementId: "G-TCJ1BW1FFR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allEmails = [];
        const ADMIN_PASSWORD = 'admin123';

        window.checkPassword = function() {
            if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        };

        if (localStorage.getItem('adminLoggedIn') === 'true') showDashboard();

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadEmails();
        }

        window.logout = function() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        };

        function loadEmails() {
            const q = query(collection(db, "emails"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                allEmails = [];
                snapshot.forEach(doc => allEmails.push({ id: doc.id, ...doc.data() }));
                displayEmails(allEmails);
                updateStats(allEmails);
            });
        }

        function displayEmails(emails) {
            const list = document.getElementById('emailsList');
            if (emails.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>No subscribers yet</h3></div>';
            } else {
                list.innerHTML = emails.map(e => `
                    <div class="email-item">
                        <div>${e.email}</div>
                        <div>${e.date?.toDate().toLocaleString() || 'N/A'}</div>
                    </div>
                `).join('');
            }
            document.getElementById('listCount').textContent = emails.length;
        }

        function updateStats(emails) {
            document.getElementById('totalCount').textContent = emails.length;
            const now = new Date();
            const today = emails.filter(e => e.date?.toDate().toDateString() === now.toDateString());
            const week = emails.filter(e => e.date?.toDate() > new Date(now - 7*24*60*60*1000));
            document.getElementById('todayCount').textContent = today.length;
            document.getElementById('weekCount').textContent = week.length;
        }

        window.searchEmails = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            displayEmails(allEmails.filter(e => e.email.toLowerCase().includes(term)));
        };

        window.exportEmails = function() {
            if (!allEmails.length) return alert('No emails to export');
            let csv = 'Email,Date\n';
            allEmails.forEach(e => csv += `${e.email},${e.date?.toDate().toLocaleString()}\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `emails-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        };
    </script>
</body>
</html>

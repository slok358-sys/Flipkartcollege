<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Flipkart College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #DC2626;
            --bright-red: #FF3B3B;
            --dark-red: #B91C1C;
            --accent-black: #0F0F0F;
            --dark-grey: #1A1A1A;
            --light-grey: #2A2A2A;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--accent-black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Screen */
        .login-container {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 24px;
            padding: 50px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 12px;
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(220, 38, 38, 0.6);
        }

        .error-message {
            color: var(--bright-red);
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dashboard-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .dashboard-title span {
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-red), var(--bright-red));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.6);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: rgba(220, 38, 38, 0.1);
            border-color: var(--primary-red);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #EF4444;
            color: #EF4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--bright-red);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .emails-container {
            background: var(--dark-grey);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .emails-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .emails-count {
            font-weight: 600;
        }

        .emails-count span {
            color: var(--bright-red);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 15px 10px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.9rem;
            outline: none;
            width: 250px;
        }

        .search-box input:focus {
            border-color: var(--primary-red);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        .emails-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .emails-list::-webkit-scrollbar {
            width: 8px;
        }

        .emails-list::-webkit-scrollbar-track {
            background: var(--dark-grey);
        }

        .emails-list::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 4px;
        }

        .email-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .email-item:hover {
            background: rgba(220, 38, 38, 0.05);
        }

        .email-item:last-child {
            border-bottom: none;
        }

        .email-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .email-address {
            font-weight: 500;
            color: var(--white);
        }

        .email-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-delete {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #EF4444;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-grey);
            border: 1px solid var(--primary-red);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            font-size: 1.5rem;
        }

        .toast-message {
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }

            .dashboard-title {
                font-size: 1.5rem;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }

            .search-box input {
                width: 100%;
            }

            .emails-header {
                flex-direction: column;
            }

            .email-item {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginContainer">
        <div class="login-logo">Flipkart College</div>
        <div class="login-subtitle">Admin Dashboard</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
        </div>
        <button class="btn-login" onclick="checkPassword()">Login</button>
        <div class="error-message" id="errorMessage">Incorrect password</div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Notify Me <span>Subscribers</span></h1>
            <div class="dashboard-actions">
                <button class="btn btn-secondary" onclick="exportEmails()">📥 Export CSV</button>
                <button class="btn btn-danger" onclick="clearAllEmails()">🗑️ Clear All</button>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weekCount">0</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div class="emails-container">
            <div class="emails-header">
                <div class="emails-count">Total: <span id="listCount">0</span> emails</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search emails..." onkeyup="searchEmails()">
                </div>
            </div>
            <div class="emails-list" id="emailsList">
                <!-- Emails will be populated here -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✅</div>
        <div class="toast-message" id="toastMessage">Action completed</div>
    </div>

    <script>
        // Backend API URL
        const API_URL = 'http://localhost:3000/api';

        // Store emails in memory for search/export
        let allEmails = [];

        // Simple password protection (change this to your desired password)
        const ADMIN_PASSWORD = 'admin123';

        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showDashboard();
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        // Enter key login
        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadEmails();
            // Auto-refresh every 10 seconds
            setInterval(loadEmails, 10000);
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        async function loadEmails() {
            try {
                const response = await fetch(`${API_URL}/emails`);
                const data = await response.json();
                
                if (response.ok) {
                    allEmails = data.emails;
                    displayEmails(allEmails);
                    updateStats(allEmails);
                } else {
                    showToast('Error loading emails', '❌');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Unable to connect to server', '❌');
            }
        }

        function displayEmails(emails) {
            const list = document.getElementById('emailsList');
            
            if (emails.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No subscribers yet</h3>
                        <p>Emails will appear here when users sign up on the main page</p>
                    </div>
                `;
            } else {
                list.innerHTML = emails.map((email) => `
                    <div class="email-item">
                        <div class="email-info">
                            <div class="email-address">${escapeHtml(email.email)}</div>
                            <div class="email-date">${formatDate(email.date)}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteEmail('${email.id}')">Delete</button>
                    </div>
                `).join('');
            }
            
            document.getElementById('listCount').textContent = emails.length;
        }

        function updateStats(emails) {
            document.getElementById('totalCount').textContent = emails.length;
            
            const now = new Date();
            const today = emails.filter(e => {
                if (!e.date) return false;
                const date = e.date._seconds ? new Date(e.date._seconds * 1000) : new Date(e.date);
                return date.toDateString() === now.toDateString();
            });
            document.getElementById('todayCount').textContent = today.length;
            
            const oneWeekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
            const thisWeek = emails.filter(e => {
                if (!e.date) return false;
                const date = e.date._seconds ? new Date(e.date._seconds * 1000) : new Date(e.date);
                return date > oneWeekAgo;
            });
            document.getElementById('weekCount').textContent = thisWeek.length;
        }

        async function deleteEmail(id) {
            try {
                const response = await fetch(`${API_URL}/emails/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showToast('Email deleted', '✅');
                    loadEmails();
                } else {
                    showToast('Error deleting email', '❌');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error deleting email', '❌');
            }
        }

        async function clearAllEmails() {
            if (confirm('Are you sure you want to delete all emails? This cannot be undone.')) {
                try {
                    const response = await fetch(`${API_URL}/emails`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        showToast('All emails cleared', '🗑️');
                        loadEmails();
                    } else {
                        showToast('Error clearing emails', '❌');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error clearing emails', '❌');
                }
            }
        }

        function searchEmails() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allEmails.filter(e => e.email.toLowerCase().includes(searchTerm));
            displayEmails(filtered);
        }

        function exportEmails() {
            if (allEmails.length === 0) {
                showToast('No emails to export', '⚠️');
                return;
            }
            
            let csv = 'Email,Date\n';
            allEmails.forEach(e => {
                const date = e.date ? formatDate(e.date) : 'N/A';
                csv += `${e.email},${date}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `flipkart-college-emails-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            showToast('CSV exported successfully', '📥');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Unknown';
            // Handle Firestore timestamp format
            const date = timestamp._seconds ? new Date(timestamp._seconds * 1000) : new Date(timestamp);
            return date.toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showToast(message, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toastIcon').textContent = icon;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
